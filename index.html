<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --bg:#ffffff;
    --text:#111111;
    --muted:#6b6b6b;
    --blob:#f3f3f3;
}

body{
    font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:var(--bg);
    color:var(--text);
    display:grid;
    place-items:center;
    min-height:100vh;
    overflow:hidden;
    position:relative;
}

/* Background Blobs */
.blob{
    position:absolute;
    pointer-events:none;
    z-index:0;
/*    opacity:0.9;*/

}

.blob-1{
    width:720px;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

.blob-2{
    width:420px;
    top:18%;
    right:-120px;
    opacity:.45;
}

.blob-3{
    width:320px;
    bottom:-120px;
    left:-80px;
    opacity:.35;
}

main{
    position:relative;
    z-index:1;
    text-align:center;
    max-width:520px;
    padding:40px;
}

h1{
    font-size:48px;
    font-weight:500;
    letter-spacing:-0.05em;
    margin-bottom:18px;
}

p{
    color:var(--muted);
    font-size:17px;
    line-height:1.8;
}

@media (max-width:768px){
    h1{
        font-size:38px;
    }

    .blob-1{
        width:560px;
    }
}

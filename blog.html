<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>記録 // VIRE_ADRYN LOG</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@400;700;900&display=swap');

  :root{
    --yellow:#f4d03f;
    --yellow-bright:#ffe566;
    --cyan:#39e6e6;
    --cyan-dim:#1d7a7a;
    --bg:#08090c;
    --bg-panel:#0e1014;
    --bg-panel2:#121620;
    --line:rgba(244,208,63,0.25);
    --text-dim:#8a93a3;
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  body{
    background:var(--bg);
    background-image:
      radial-gradient(circle at 15% 10%, rgba(57,230,230,0.07), transparent 35%),
      radial-gradient(circle at 85% 80%, rgba(244,208,63,0.06), transparent 40%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 3px);
    color:#dfe3ea;
    font-family:'Share Tech Mono', monospace;
    min-height:100vh;
    overflow-x:hidden;
  }

  /* ---------- HEADER ---------- */
  header{
    border-bottom:1px solid var(--line);
    padding:28px 6vw 22px;
    position:relative;
  }
  .eyebrow{
    color:var(--cyan);
    font-size:11px;
    letter-spacing:3px;
    display:flex;
    justify-content:space-between;
    margin-bottom:14px;
    opacity:0.85;
  }
  .eyebrow span::before{content:"// ";color:var(--yellow);}
  h1.brand{
    font-family:'Noto Sans JP', sans-serif;
    font-weight:900;
    font-size:clamp(28px,5vw,52px);
    letter-spacing:2px;
    color:var(--yellow-bright);
    text-shadow:0 0 18px rgba(244,208,63,0.35);
    line-height:1.05;
  }
  h1.brand .jp{color:var(--cyan);text-shadow:0 0 18px rgba(57,230,230,0.45);font-size:0.6em;margin-left:10px;}
  .subhead{
    color:var(--text-dim);
    font-size:13px;
    margin-top:10px;
    letter-spacing:1px;
  }
  .subhead b{color:var(--cyan);font-weight:400;}

  /* ---------- SECTION LABEL ---------- */
  .section-label{
    display:flex;
    align-items:center;
    gap:14px;
    margin:50px 6vw 26px;
  }
  .section-label .num{
    font-family:'Noto Sans JP',sans-serif;
    font-weight:900;
    font-size:13px;
    color:var(--bg);
    background:var(--yellow);
    padding:4px 10px;
    clip-path:polygon(0 0,100% 0,100% 70%,90% 100%,0 100%);
  }
  .section-label .lbl{
    font-size:13px;
    letter-spacing:4px;
    color:var(--cyan);
  }
  .section-label .rule{flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent);}

  /* ---------- GRID ---------- */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:26px;
    padding:0 6vw 80px;
  }

  /* cut-corner yellow box */
  .post-box{
    position:relative;
    aspect-ratio:1/1;
    background:linear-gradient(155deg,var(--bg-panel2),var(--bg-panel) 60%);
    clip-path:polygon(0 0, calc(100% - 26px) 0, 100% 26px, 100% 100%, 26px 100%, 0 calc(100% - 26px));
    cursor:pointer;
    padding:22px;
    display:flex;
    flex-direction:column;
    transition:transform .25s ease, box-shadow .25s ease, background .25s ease;
    overflow:hidden;
  }
  .post-box::before{
    content:"";
    position:absolute;inset:0;
    padding:1.5px;
    background:linear-gradient(135deg,var(--yellow) 0%, rgba(244,208,63,0.15) 35%, rgba(57,230,230,0.5) 70%, var(--cyan) 100%);
    clip-path:inherit;
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;
    mask-composite:exclude;
    pointer-events:none;
  }
  .post-box::after{
    content:"";
    position:absolute;
    top:0;right:0;
    width:26px;height:26px;
    background:var(--yellow);
    clip-path:polygon(100% 0,0 0,100% 100%);
    opacity:0.85;
  }
  .post-box:hover{
    transform:translateY(-4px);
    box-shadow:0 0 0 1px rgba(57,230,230,0.4), 0 18px 40px -12px rgba(244,208,63,0.25), 0 0 30px -4px rgba(57,230,230,0.3);
    background:linear-gradient(155deg,#161b27,var(--bg-panel) 60%);
  }

  .post-id{
    font-size:11px;
    color:var(--cyan);
    letter-spacing:2px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
  }
  .post-id .dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--cyan);
    box-shadow:0 0 8px var(--cyan);
    display:inline-block;
    margin-right:6px;
    animation:blink 1.8s infinite;
  }
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}

  .post-title{
    font-family:'Noto Sans JP',sans-serif;
    font-weight:700;
    font-size:18px;
    color:var(--yellow-bright);
    line-height:1.3;
    margin-bottom:12px;
  }
  .post-title .jp-tag{
    display:block;
    font-size:11px;
    color:var(--cyan-dim);
    font-weight:400;
    margin-top:4px;
    letter-spacing:2px;
  }

  .post-excerpt{
    font-size:13px;
    color:var(--text-dim);
    line-height:1.6;
    flex:1;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }

  .post-footer{
    margin-top:14px;
    font-size:11px;
    color:var(--cyan);
    letter-spacing:1.5px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-top:1px dashed var(--line);
    padding-top:10px;
  }
  .post-footer .open-arrow{color:var(--yellow);transition:transform .2s;}
  .post-box:hover .open-arrow{transform:translateX(4px);}

  /* ---------- TERMINAL MODAL ---------- */
  .overlay{
    position:fixed;inset:0;
    background:rgba(3,4,6,0.85);
    backdrop-filter:blur(4px);
    display:none;
    align-items:center;justify-content:center;
    z-index:1000;
    padding:20px;
  }
  .overlay.active{display:flex;}

  .terminal{
    width:min(720px,100%);
    max-height:82vh;
    background:#070a08;
    border:1px solid var(--cyan-dim);
    box-shadow:0 0 0 1px rgba(244,208,63,0.15), 0 0 60px rgba(57,230,230,0.15), 0 30px 80px rgba(0,0,0,0.6);
    display:flex;
    flex-direction:column;
    font-family:'Share Tech Mono',monospace;
    animation:termIn .22s ease;
  }
  @keyframes termIn{from{opacity:0;transform:scale(0.96) translateY(10px);}to{opacity:1;transform:none;}}

  .term-bar{
    background:linear-gradient(90deg,#151a14,#0d100d);
    border-bottom:1px solid var(--cyan-dim);
    padding:9px 14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .term-bar .lights{display:flex;gap:7px;}
  .term-bar .lights span{width:10px;height:10px;border-radius:50%;display:inline-block;}
  .term-bar .lights .r{background:#ff5f56;}
  .term-bar .lights .y{background:var(--yellow);}
  .term-bar .lights .g{background:var(--cyan);}
  .term-bar .path{font-size:11px;color:var(--cyan);letter-spacing:1px;}
  .term-bar .close-btn{
    background:none;border:1px solid var(--yellow);
    color:var(--yellow);
    font-family:inherit;font-size:11px;
    padding:3px 10px;
    cursor:pointer;
    letter-spacing:1px;
  }
  .term-bar .close-btn:hover{background:var(--yellow);color:#000;}

  .term-body{
    padding:22px 24px 30px;
    overflow-y:auto;
    color:#9dffb0;
    font-size:13.5px;
    line-height:1.85;
  }
  .term-body::-webkit-scrollbar{width:8px;}
  .term-body::-webkit-scrollbar-thumb{background:var(--cyan-dim);}
  .term-body::-webkit-scrollbar-track{background:#0a0c0a;}

  .term-line{white-space:pre-wrap;}
  .term-prompt{color:var(--cyan);}
  .term-title{
    color:var(--yellow-bright);
    font-family:'Noto Sans JP',sans-serif;
    font-weight:700;
    font-size:19px;
    margin:4px 0 16px;
  }
  .term-meta{color:var(--cyan-dim);font-size:11px;margin-bottom:18px;letter-spacing:1px;}
  .term-content p{margin-bottom:14px;color:#cfe8d4;}
  .term-content .accent{color:var(--yellow);}
  .term-cursor{
    display:inline-block;width:8px;height:14px;background:var(--cyan);
    vertical-align:middle;margin-left:2px;
    animation:blink 1s steps(2) infinite;
  }
  .term-footer-line{margin-top:20px;color:var(--text-dim);font-size:11px;border-top:1px dashed rgba(57,230,230,0.2);padding-top:14px;}

  footer{
    border-top:1px solid var(--line);
    padding:24px 6vw;
    display:flex;justify-content:space-between;
    font-size:11px;color:var(--text-dim);letter-spacing:1.5px;
  }
  footer .cy{color:var(--cyan);}

  @media(max-width:520px){
    .grid{grid-template-columns:1fr;}
    .section-label{margin:36px 5vw 20px;}
    header{padding:22px 5vw 18px;}
    footer{flex-direction:column;gap:6px;}
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">
    <span>ENTITY_ID: 0xOM2E8F</span>
    <span>AL-MINYA · 30.73°N</span>
  </div>
  <h1 class="brand">記録 LOG <span class="jp">雄偉アドリン</span></h1>
  <div class="subhead">Field notes from <b>vire_adryn</b> — code, security, design. Click a box to decrypt the full entry.</div>
</header>

<div class="section-label">
  <div class="num">06</div>
  <div class="lbl">ENTRY_ARCHIVE</div>
  <div class="rule"></div>
</div>

<div class="grid" id="grid"></div>

<footer>
  <span>OMAR_MOMEN // v2.8</span>
  <span class="cy">ARCHIVE STATUS: ONLINE</span>
</footer>

<div class="overlay" id="overlay">
  <div class="terminal">
    <div class="term-bar">
      <div class="lights"><span class="r"></span><span class="y"></span><span class="g"></span></div>
      <div class="path" id="termPath">~/log/entry</div>
      <button class="close-btn" id="closeBtn">[ X ] CLOSE</button>
    </div>
    <div class="term-body" id="termBody"></div>
  </div>
</div>

<script>
const posts = [
  {
    id: "LOG_001",
    jp: "防御の心",
    title: "Why I Build With Security First",
    excerpt: "Most devs bolt security on at the end. I learned the hard way that the cheapest fix is the one you make before the feature ships, not after.",
    body: [
      "ttt",
      "ttt",
      "ttt",
      "ttt"
    ],
    meta: "ACCESS_LEVEL: PUBLIC · TAGS: security, bug-hunting, mindset"
  },
  {
  
];

const grid = document.getElementById('grid');
const overlay = document.getElementById('overlay');
const termBody = document.getElementById('termBody');
const termPath = document.getElementById('termPath');
const closeBtn = document.getElementById('closeBtn');

posts.forEach((p, i) => {
  const box = document.createElement('div');
  box.className = 'post-box';
  box.innerHTML = `
    <div class="post-id"><span><span class="dot"></span>${p.id}</span><span>${String(i+1).padStart(2,'0')}/0${posts.length}</span></div>
    <div class="post-title">${p.title}<span class="jp-tag">${p.jp}</span></div>
    <div class="post-excerpt">${p.excerpt}</div>
    <div class="post-footer"><span>READ_MORE</span><span class="open-arrow">▶▶</span></div>
  `;
  box.addEventListener('click', () => openTerminal(p));
  grid.appendChild(box);
});

function openTerminal(p){
  termPath.textContent = `~/log/${p.id.toLowerCase()}`;
  termBody.innerHTML = `
    <div class="term-line"><span class="term-prompt">vire@adryn:~$</span> cat ${p.id.toLowerCase()}.log</div>
    <div class="term-title">${p.title}</div>
    <div class="term-meta">${p.meta}</div>
    <div class="term-content">
      ${p.body.map(par => `<p>${par}</p>`).join('')}
    </div>
    <div class="term-footer-line">[ EOF ] entry decrypted successfully<span class="term-cursor"></span></div>
  `;
  overlay.classList.add('active');
}

function closeTerminal(){ overlay.classList.remove('active'); }
closeBtn.addEventListener('click', closeTerminal);
overlay.addEventListener('click', e => { if(e.target === overlay) closeTerminal(); });
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeTerminal(); });
</script>

</body>
</html>
